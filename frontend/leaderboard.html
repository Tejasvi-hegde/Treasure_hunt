<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasure Hunt — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c9963f;
      --gold-lt: #e8b96a;
      --gold-dk: #7a5a1e;
      --bg:      #0a0c0f;
      --bg2:     #111318;
      --bg3:     #1a1e26;
      --border:  #2a2e3a;
      --text:    #e8dcc8;
      --text-dim:#8a7f6e;
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,220,130,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 20%, rgba(255,220,130,.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 75%, rgba(255,220,130,.2) 0%, transparent 100%);
      pointer-events: none;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,12,15,.95);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { font-family: 'Cinzel', serif; font-size: .9rem; letter-spacing: .15em; color: var(--gold-lt); }
    header a {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .1em;
      color: var(--text-dim);
      text-decoration: none;
      transition: color .2s;
    }
    header a:hover { color: var(--gold-lt); }

    main { max-width: 860px; margin: 0 auto; padding: 3rem 1.5rem; position: relative; z-index: 1; }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      color: var(--gold-lt);
      text-align: center;
      letter-spacing: .1em;
      margin-bottom: .3rem;
    }
    .sub {
      text-align: center;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 2.5rem;
      font-size: .95rem;
    }

    /* Refresh indicator */
    .refresh-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: .5rem;
      margin-bottom: 1rem;
      font-size: .75rem;
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      letter-spacing: .08em;
    }
    .refresh-dot {
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: blink 2s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── Table ── */
    .lb-table {
      width: 100%;
      border-collapse: collapse;
    }
    .lb-table thead tr {
      border-bottom: 1px solid var(--border);
    }
    .lb-table th {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .15em;
      color: var(--text-dim);
      padding: .7rem 1rem;
      text-align: left;
      font-weight: 400;
    }
    .lb-table th:first-child { width: 60px; text-align: center; }
    .lb-table th:last-child { text-align: right; }

    .lb-table td {
      padding: .9rem 1rem;
      border-bottom: 1px solid rgba(42,46,58,.5);
      font-size: .95rem;
      vertical-align: middle;
    }
    .lb-table td:first-child { text-align: center; }
    .lb-table td:last-child { text-align: right; }

    .lb-table tbody tr {
      transition: background .15s;
    }
    .lb-table tbody tr:hover { background: rgba(255,255,255,.02); }

    /* ── Rank badges ── */
    .rank { font-family: 'Cinzel', serif; font-size: .85rem; }
    .rank-1 { color: #ffd700; font-size: 1.1rem; }
    .rank-2 { color: #c0c0c0; font-size: 1rem; }
    .rank-3 { color: #cd7f32; font-size: 1rem; }

    /* Team name */
    .team-name { font-weight: 600; font-size: 1.05rem; }
    .finished-badge {
      display: inline-block;
      background: rgba(39,174,96,.15);
      border: 1px solid rgba(39,174,96,.3);
      color: #6dcf98;
      font-family: 'Cinzel', serif;
      font-size: .58rem;
      letter-spacing: .1em;
      padding: .15rem .5rem;
      border-radius: 50px;
      margin-left: .6rem;
      vertical-align: middle;
    }

    /* Progress pills */
    .progress-pills { display: flex; gap: 3px; align-items: center; }
    .pill {
      width: 14px;
      height: 5px;
      border-radius: 3px;
      background: var(--bg3);
    }
    .pill.done { background: var(--gold-dk); }
    .pill.done-all { background: var(--gold-lt); }

    .time-val { color: var(--text-dim); font-size: .9rem; font-family: 'Crimson Pro', serif; }

    /* ── Empty / loading ── */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-dim);
      font-style: italic;
      font-size: 1.1rem;
    }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1;
      min-width: 120px;
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: .8rem 1.2rem;
      border-radius: 1px;
      text-align: center;
    }
    .stat-card .val { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--gold-lt); }
    .stat-card .lbl { font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .1em; color: var(--text-dim); margin-top: .2rem; }
  </style>
</head>
<body>

<header>
  <span class="brand">⚓ TREASURE HUNT</span>
  <a href="index.html">← LOGIN</a>
</header>

<main>
  <h1>THE SCROLLS OF GLORY</h1>
  <p class="sub">Live standings — refreshes every 15 seconds</p>

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="val" id="stat-teams">—</div><div class="lbl">TEAMS</div></div>
    <div class="stat-card"><div class="val" id="stat-finished">—</div><div class="lbl">FINISHED</div></div>
    <div class="stat-card"><div class="val" id="stat-active">—</div><div class="lbl">ACTIVE</div></div>
  </div>

  <div class="refresh-bar">
    <span class="refresh-dot"></span>
    <span id="refresh-label">Loading...</span>
  </div>

  <table class="lb-table">
    <thead>
      <tr>
        <th>#</th>
        <th>TEAM</th>
        <th>PROGRESS</th>
        <th>QUESTIONS</th>
        <th>TOTAL TIME</th>
      </tr>
    </thead>
    <tbody id="lb-body">
      <tr><td colspan="5" class="empty">Loading leaderboard...</td></tr>
    </tbody>
  </table>
</main>

<script>
  // ── CONFIG ─────────────────────────────────────────────
  const API = "";
  // Example: const API = "https://treasure-hunt-api.onrender.com";
  const ADMIN_KEY = sessionStorage.getItem('th_admin_key') || '';

  if (!ADMIN_KEY) {
    window.location.href = 'admin.html';
  }

  function fmtTime(secs) {
    if (!secs && secs !== 0) return '—';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    if (h > 0) return `${h}h ${m}m ${s}s`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }

  function rankDisplay(i, finished) {
    if (!finished) return `<span class="rank">${i + 1}</span>`;
    if (i === 0) return '<span class="rank rank-1">🥇</span>';
    if (i === 1) return '<span class="rank rank-2">🥈</span>';
    if (i === 2) return '<span class="rank rank-3">🥉</span>';
    return `<span class="rank">${i + 1}</span>`;
  }

  function progressPills(solved, total, finished) {
    let html = '<div class="progress-pills">';
    for (let i = 1; i <= total; i++) {
      const cls = i <= solved ? (finished ? 'pill done-all' : 'pill done') : 'pill';
      html += `<div class="${cls}"></div>`;
    }
    html += '</div>';
    return html;
  }

  async function load() {
    try {
      const res = await fetch(`${API}/api/admin/leaderboard`, {
        headers: { 'X-Admin-Key': ADMIN_KEY }
      });
      if (res.status === 401 || res.status === 403) {
        sessionStorage.removeItem('th_admin_key');
        window.location.href = 'admin.html';
        return;
      }
      if (!res.ok) throw new Error('Failed');
      const { teams, totalQuestions } = await res.json();

      // Stats
      const finished = teams.filter(t => t.is_finished).length;
      document.getElementById('stat-teams').textContent    = teams.length;
      document.getElementById('stat-finished').textContent = finished;
      document.getElementById('stat-active').textContent   = teams.length - finished;

      const tbody = document.getElementById('lb-body');
      if (!teams.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No teams have registered yet.</td></tr>';
        return;
      }

      tbody.innerHTML = teams.map((t, i) => `
        <tr>
          <td>${rankDisplay(i, t.is_finished)}</td>
          <td>
            <span class="team-name">${escHtml(t.name)}</span>
            ${t.is_finished ? '<span class="finished-badge">✓ FINISHED</span>' : ''}
          </td>
          <td>${progressPills(t.questions_solved, totalQuestions, t.is_finished)}</td>
          <td>${t.questions_solved} / ${totalQuestions}</td>
          <td><span class="time-val">${fmtTime(t.total_time_seconds || 0)}</span></td>
        </tr>
      `).join('');

      document.getElementById('refresh-label').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch {
      document.getElementById('refresh-label').textContent = 'Error loading — retrying...';
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  load();
  setInterval(load, 15000);
</script>
</body>
</html>
