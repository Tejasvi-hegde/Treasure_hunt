<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasure Hunt — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c9963f;
      --gold-lt: #e8b96a;
      --gold-dk: #7a5a1e;
      --bg:      #0a0c0f;
      --bg2:     #111318;
      --bg3:     #1a1e26;
      --border:  #2a2e3a;
      --text:    #e8dcc8;
      --text-dim:#8a7f6e;
      --green:   #27ae60;
      --red:     #c0392b;
      --blue:    #2980b9;
    }

    html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:'Crimson Pro',serif; font-size:15px; }

    /* ── Login gate ── */
    #login-gate {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; gap:1rem;
    }
    #login-gate h2 { font-family:'Cinzel',serif; letter-spacing:.1em; color:var(--gold-lt); }
    #admin-key-input {
      padding:.7rem 1rem; background:var(--bg3); border:1px solid var(--border);
      color:var(--text); font-family:'JetBrains Mono',monospace; font-size:.9rem;
      width:280px; outline:none; border-radius:1px;
    }
    .btn {
      padding:.65rem 1.4rem;
      background:linear-gradient(135deg,var(--gold-dk),var(--gold));
      border:none; border-radius:1px;
      color:#0a0c0f; font-family:'Cinzel',serif; font-size:.75rem;
      font-weight:700; letter-spacing:.1em; cursor:pointer;
    }
    .btn:hover { opacity:.9; }

    /* ── Main layout ── */
    #app { display:none; }
    header {
      display:flex; align-items:center; justify-content:space-between;
      padding:.75rem 1.5rem; background:rgba(10,12,15,.95);
      border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20;
    }
    .brand { font-family:'Cinzel',serif; font-size:.85rem; letter-spacing:.12em; color:var(--gold-lt); }
    .admin-badge {
      background:rgba(201,150,63,.1); border:1px solid var(--gold-dk);
      color:var(--gold); font-family:'Cinzel',serif; font-size:.6rem;
      padding:.2rem .6rem; letter-spacing:.1em;
    }
    .hdr-right { display:flex; gap:1rem; align-items:center; }
    .refresh-btn {
      background:none; border:1px solid var(--border); color:var(--text-dim);
      font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.1em;
      padding:.3rem .7rem; cursor:pointer; transition:all .2s;
    }
    .refresh-btn:hover { border-color:var(--gold-dk); color:var(--gold); }

    main { max-width:1100px; margin:0 auto; padding:2rem 1.5rem; }

    /* ── Stats grid ── */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:.75rem; margin-bottom:2rem; }
    .stat-card {
      background:var(--bg2); border:1px solid var(--border); padding:1rem 1.2rem;
    }
    .stat-card .val { font-family:'Cinzel',serif; font-size:1.8rem; color:var(--gold-lt); }
    .stat-card .lbl { font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.12em; color:var(--text-dim); margin-top:.3rem; }

    /* ── Section title ── */
    .sec-title {
      font-family:'Cinzel',serif; font-size:.75rem; letter-spacing:.15em; color:var(--text-dim);
      border-bottom:1px solid var(--border); padding-bottom:.6rem; margin-bottom:1rem; margin-top:2rem;
    }

    /* ── Table ── */
    .tbl { width:100%; border-collapse:collapse; font-size:.88rem; }
    .tbl th {
      font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.12em; color:var(--text-dim);
      padding:.6rem .8rem; text-align:left; border-bottom:1px solid var(--border);
    }
    .tbl td { padding:.7rem .8rem; border-bottom:1px solid rgba(42,46,58,.4); vertical-align:middle; }
    .tbl tbody tr:hover { background:rgba(255,255,255,.02); cursor:pointer; }

    .badge-finished { display:inline-block; background:rgba(39,174,96,.15); border:1px solid rgba(39,174,96,.3); color:#6dcf98; font-size:.6rem; font-family:'Cinzel',serif; padding:.1rem .5rem; letter-spacing:.08em; }
    .badge-active   { display:inline-block; background:rgba(41,128,185,.12); border:1px solid rgba(41,128,185,.3); color:#7ab8d8; font-size:.6rem; font-family:'Cinzel',serif; padding:.1rem .5rem; letter-spacing:.08em; }

    .correct   { color:#6dcf98; }
    .incorrect { color:#e07060; }
    .dim       { color:var(--text-dim); }

    /* ── Progress mini ── */
    .prog-mini { display:flex; gap:2px; }
    .pm { width:10px; height:4px; border-radius:2px; background:var(--bg3); }
    .pm.d { background:var(--gold-dk); }

    /* ── Modal ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
      z-index:100; align-items:center; justify-content:center; padding:1rem;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--bg2); border:1px solid var(--border); max-width:680px; width:100%;
      max-height:80vh; overflow-y:auto; padding:1.5rem;
      animation:rise .25s ease both;
    }
    @keyframes rise { from{opacity:0;transform:translateY(16px)} }
    .modal-title { font-family:'Cinzel',serif; color:var(--gold-lt); font-size:1rem; letter-spacing:.1em; margin-bottom:1rem; }
    .modal-close { float:right; background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:1.2rem; }
    .modal-close:hover { color:var(--text); }

    .sub-row { display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap; margin-bottom:.4rem; padding:.5rem .7rem; background:var(--bg3); border-left:2px solid var(--gold-dk); font-size:.85rem; }

    .attempt-row {
      display:flex; justify-content:space-between; align-items:center; gap:.5rem;
      padding:.4rem .6rem; border-bottom:1px solid rgba(42,46,58,.3); font-size:.82rem;
    }
    .attempt-ans { font-family:'JetBrains Mono',monospace; color:var(--text); }

    .warn-box {
      margin-top:1.5rem; padding:.8rem 1rem;
      background:rgba(192,57,43,.1); border:1px solid rgba(192,57,43,.3);
      color:#e07060; font-size:.85rem;
    }
    .warn-box .btn-sm {
      margin-top:.6rem; padding:.4rem .8rem;
      background:var(--red); border:none; color:#fff;
      font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.1em;
      cursor:pointer;
    }

    code { font-family:'JetBrains Mono',monospace; font-size:.85em; }
  </style>
</head>
<body>

<!-- Login Gate -->
<div id="login-gate">
  <h2>🔐 ADMIN ACCESS</h2>
  <input id="admin-key-input" type="password" placeholder="Enter admin key" />
  <button class="btn" onclick="adminLogin()">UNLOCK DASHBOARD</button>
  <p id="login-err" style="color:#e07060;font-size:.85rem;display:none;"></p>
</div>

<!-- App -->
<div id="app">
  <header>
    <div>
      <span class="brand">⚓ TREASURE HUNT</span>
      <span class="admin-badge" style="margin-left:.8rem;">ADMIN</span>
    </div>
    <div class="hdr-right">
      <span id="last-updated" style="font-size:.7rem;color:var(--text-dim);font-family:Cinzel,serif;"></span>
      <button class="refresh-btn" onclick="loadAll()">↻ REFRESH</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card"><div class="val" id="s-teams">—</div><div class="lbl">TOTAL TEAMS</div></div>
      <div class="stat-card"><div class="val" id="s-finished">—</div><div class="lbl">FINISHED</div></div>
      <div class="stat-card"><div class="val" id="s-active">—</div><div class="lbl">STILL HUNTING</div></div>

    </div>

    <!-- Leaderboard table -->
    <div class="sec-title">LEADERBOARD</div>
    <table class="tbl">
      <thead>
        <tr>
          <th>#</th>
          <th>TEAM NAME</th>
          <th>STATUS</th>
          <th>PROGRESS</th>
          <th>SOLVED</th>
          <th>TOTAL TIME</th>
          <th>REGISTERED</th>
        </tr>
      </thead>
      <tbody id="lb-body">
        <tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:2rem;">Loading...</td></tr>
      </tbody>
    </table>

    <!-- Danger zone -->
    <div class="warn-box" style="margin-top:3rem;">
      <strong style="font-family:Cinzel,serif;font-size:.7rem;letter-spacing:.1em;">⚠ DANGER ZONE</strong><br/>
      Resets all team progress (keep accounts). Use only before re-running the event.
      <br/><button class="btn-sm" onclick="resetCompetition()">RESET ALL PROGRESS</button>
    </div>
  </main>
</div>

<!-- Team detail modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Team Detail</div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────
  const API = "";
  // Example: const API = "https://treasure-hunt-api.onrender.com";

  let ADMIN_KEY = '';
  let TOTAL_Q   = 8;

  function adminHeaders() {
    return { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY };
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtTime(secs) {
    if (!secs) return '—';
    const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
    if (h) return `${h}h ${m}m ${s}s`;
    if (m) return `${m}m ${s}s`;
    return `${s}s`;
  }

  function fmtDt(dt) {
    if (!dt) return '—';
    return new Date(dt + 'Z').toLocaleString();
  }

  // ── Auth ────────────────────────────────────────────
  async function adminLogin() {
    ADMIN_KEY = document.getElementById('admin-key-input').value.trim();
    if (!ADMIN_KEY) return;
    try {
      const res = await fetch(`${API}/api/admin/leaderboard`, { headers: adminHeaders() });
      if (res.status === 403) {
        document.getElementById('login-err').textContent = 'Invalid admin key.';
        document.getElementById('login-err').style.display = 'block';
        return;
      }
      sessionStorage.setItem('th_admin_key', ADMIN_KEY);
      document.getElementById('login-gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadAll();
      setInterval(loadAll, 20000);
    } catch {
      document.getElementById('login-err').textContent = 'Cannot reach server.';
      document.getElementById('login-err').style.display = 'block';
    }
  }

  document.getElementById('admin-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') adminLogin();
  });

  const savedAdminKey = sessionStorage.getItem('th_admin_key');
  if (savedAdminKey) {
    document.getElementById('admin-key-input').value = savedAdminKey;
    adminLogin();
  }

  // ── Load leaderboard ─────────────────────────────────
  async function loadAll() {
    await Promise.all([loadLeaderboard()]);
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  }

  async function loadLeaderboard() {
    try {
      const res = await fetch(`${API}/api/admin/leaderboard`, { headers: adminHeaders() });
      const { teams, totalQuestions } = await res.json();
      TOTAL_Q = totalQuestions;

      document.getElementById('s-teams').textContent    = teams.length;
      document.getElementById('s-finished').textContent = teams.filter(t=>t.is_finished).length;
      document.getElementById('s-active').textContent   = teams.filter(t=>!t.is_finished).length;

      const tbody = document.getElementById('lb-body');
      if (!teams.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:2rem;">No teams yet.</td></tr>';
        return;
      }

      tbody.innerHTML = teams.map((t, i) => `
        <tr onclick="showTeam(${t.id}, '${esc(t.name)}')">
          <td style="font-family:Cinzel,serif;">${i+1}</td>
          <td>${esc(t.name)}</td>
          <td>${t.is_finished
            ? '<span class="badge-finished">FINISHED</span>'
            : `<span class="badge-active">Q${t.current_question}</span>`}
          </td>
          <td>
            <div class="prog-mini">
              ${Array.from({length:totalQuestions},(_,j)=>
                `<div class="pm${j<t.questions_solved?' d':''}"></div>`).join('')}
            </div>
          </td>
          <td>${t.questions_solved} / ${totalQuestions}</td>
          <td class="dim">${fmtTime(t.total_time_seconds)}</td>
          <td class="dim" style="font-size:.8rem;">${fmtDt(t.registered_at)}</td>
        </tr>
      `).join('');
    } catch(e) {
      console.error(e);
    }
  }


  // ── Team detail modal ────────────────────────────────
  async function showTeam(teamId, teamName) {
    document.getElementById('modal-title').textContent = '📋 ' + teamName;
    document.getElementById('modal-body').innerHTML = '<p style="color:var(--text-dim);font-style:italic;">Loading...</p>';
    document.getElementById('modal').classList.add('open');

    try {
      const res = await fetch(`${API}/api/admin/team/${teamId}`, { headers: adminHeaders() });
      const { team, submissions } = await res.json();

      let html = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1.2rem;font-size:.85rem;">
          <div class="dim">Registered:</div><div>${fmtDt(team.registered_at)}</div>
          <div class="dim">Started at:</div><div>${fmtDt(team.started_at)}</div>
          <div class="dim">Current Q:</div><div style="font-family:Cinzel,serif;">${team.is_finished ? '✓ FINISHED' : 'Q' + team.current_question}</div>
          ${team.finish_time ? `<div class="dim">Finished at:</div><div>${fmtDt(team.finish_time)}</div>` : ''}
        </div>
      `;

      if (submissions.length) {
        html += `<div style="font-family:Cinzel,serif;font-size:.65rem;letter-spacing:.1em;color:var(--text-dim);margin-bottom:.6rem;">SOLVED QUESTIONS</div>`;
        html += submissions.map(s => `
          <div class="sub-row">
            <span><strong style="font-family:Cinzel,serif;">Q${s.question_number}</strong></span>
            <span class="dim">${fmtDt(s.solved_at)}</span>
            <span class="correct">+${fmtTime(s.time_taken_seconds)}</span>
          </div>
        `).join('');
      }

      document.getElementById('modal-body').innerHTML = html;
    } catch {
      document.getElementById('modal-body').innerHTML = '<p style="color:#e07060;">Failed to load team data.</p>';
    }
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Reset competition ────────────────────────────────
  async function resetCompetition() {
    if (!confirm('⚠️ This will reset ALL team progress (clears scores, timers, answers). Team accounts remain. Are you sure?')) return;
    if (!confirm('FINAL WARNING: All competition data will be wiped. Type OK in the next dialog to confirm.')) return;
    const confirm2 = prompt('Type RESET to confirm:');
    if (confirm2 !== 'RESET') return alert('Cancelled.');

    try {
      const res = await fetch(`${API}/api/admin/reset-competition`, {
        method: 'POST',
        headers: adminHeaders(),
        body: JSON.stringify({ confirm: 'RESET_ALL_DATA' }),
      });
      const data = await res.json();
      alert(data.message || 'Reset complete.');
      loadAll();
    } catch {
      alert('Reset failed.');
    }
  }
</script>
</body>
</html>
